<!-- Footer Start -->
<footer class="shadow py-3 d-print-none">
    <div class="container-fluid">
        <div class="col-lg-8 col-md-10 mb-2 ms-2 sponsor-container item-center">
            <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
            <script type='text/javascript'>kofiwidget2.init('Buy me a coffee', '#383a47', '$.Site.Params.sponsor.ko_fi');kofiwidget2.draw();</script> 
        </div>
        <!-- <hr class="doc-hr"> -->
        <div class="row align-items-center">
            <div class="col">
                <div class="text-sm-start text-center mx-md-2">
                    <p class="mb-0">
                        {{ $yearToken := (cond (isset .Site.Params (lower "copyrightYearToken")) $.Site.Params.copyrightYearToken ":YEAR:") }}
                        {{ replace $.Site.Params.footer.copyright $yearToken (string (now.Format "2006")) | markdownify }}
                    </p>
                </div>
            </div><!--end col-->
        </div><!--end row-->
    </div><!--end container-->
</footer><!--end footer-->
<!-- End -->
